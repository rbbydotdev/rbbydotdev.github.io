  <style>
    :root {
      --star-color: #fb8ad4;
      --star-size: 100px;

      * {
        cursor: url('img/skelhand.svg') 0 0, auto !important;
      }
    }




    .star-burst {
      position: absolute;
      width: var(--star-size);
      height: var(--star-size);
      z-index: 9999;
      margin: 20px;
      right: 2rem;
      top: 2rem;
    }

    .star-burst .star {
      background: var(--star-color);
      width: var(--star-size);
      height: var(--star-size);
      position: absolute;
      text-align: center;
      top: 0;
      left: 0;
      animation: rotate 20s linear infinite;
      /* Slower rotation */
    }

    .star-burst .star:before,
    .star-burst .star:after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: var(--star-size);
      width: var(--star-size);
      background: var(--star-color);
    }

    .star-burst .star:before {
      transform: rotate(30deg);
    }

    .star-burst .star:after {
      transform: rotate(60deg);
    }

    .star-burst .text {
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      font-size: 1.25rem;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(15deg);
      color: white;
      font-weight: bold;
      text-align: center;
      /* Center align text */
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
